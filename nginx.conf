# Rison AI Hire - Hardened Nginx Production configuration
# Save as /etc/nginx/sites-available/resume-screening-app

# 1. Rate Limiting Zones
# Restrict API routes to 10 requests per second per IP, with a burst of 20.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 2. Frontend Configuration (HTTP redirect to HTTPS)
server {
    listen 80;
    server_name app.techsolengineers.com app.risonaitech.com; # Replace with your domains
    return 301 https://$host$request_uri;
}

# 3. Backend API Configuration (HTTP redirect to HTTPS)
server {
    listen 80;
    server_name api.techsolengineers.com api.risonaitech.com; # Replace with your domains
    return 301 https://$host$request_uri;
}

# 4. HTTPS Frontend (Next.js)
server {
    listen 443 ssl http2;
    server_name app.techsolengineers.com app.risonaitech.com; # Replace with your domains

    # SSL Certificates (managed by Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/app.techsolengineers.com/fullchain.pem; # Replace path
    ssl_certificate_key /etc/letsencrypt/live/app.techsolengineers.com/privkey.pem; # Replace path
    
    # SSL Hardening Guidelines (Modern A+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level 5;

    # Next.js Static Asset Caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        access_log off;
    }

    # Next.js public files
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # Main Application Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 5. HTTPS Backend API (Express API)
server {
    listen 443 ssl http2;
    server_name api.techsolengineers.com api.risonaitech.com; # Replace with your domains

    # SSL Certificates (managed by Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/api.techsolengineers.com/fullchain.pem; # Replace path
    ssl_certificate_key /etc/letsencrypt/live/api.techsolengineers.com/privkey.pem; # Replace path

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API Request Size Limits
    client_max_body_size 15M;

    # Backend Proxy with Rate Limiting
    location / {
        # Apply API Rate Limit
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
