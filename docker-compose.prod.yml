version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-frontend
    command: npm run start
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://rison-backend:4000/api}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Express API Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-backend
    command: npx tsx src/api/server.ts
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Background Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-worker
    command: npx tsx src/worker/resumeWorker.ts
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # PostgreSQL DB
  postgres:
    image: postgres:15-alpine
    container_name: rison-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rison_db}
      - POSTGRES_USER=${POSTGRES_USER:-rison_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rison_password}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rison_user -d rison_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Server
  redis:
    image: redis:7-alpine
    container_name: rison-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-super-secure-vps-redis-pass-12345}
    volumes:
      - redisdata_prod:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-super-secure-vps-redis-pass-12345}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 📊 SRE: Prometheus (Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: rison-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    restart: always
    depends_on:
      - backend

  # 📊 SRE: Grafana (Metrics Visualizer)
  grafana:
    image: grafana/grafana:latest
    container_name: rison-grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    restart: always
    depends_on:
      - prometheus

  # 📊 SRE: Node Exporter (Host System Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: rison-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    restart: always

  # 📊 SRE: cAdvisor (Container Resource Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: rison-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: always

  # 📊 SRE: Loki (Logs Collector)
  loki:
    image: grafana/loki:latest
    container_name: rison-loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    restart: always

  # 📊 SRE: Promtail (Logs Shipper)
  promtail:
    image: grafana/promtail:latest
    container_name: rison-promtail
    volumes:
      - /var/log:/var/log:ro
      - ./logs:/var/log/rison:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    restart: always
    depends_on:
      - loki

volumes:
  pgdata_prod:
  redisdata_prod:
  prometheus_data:
  grafana_data:
  loki_data:
