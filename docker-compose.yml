version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-frontend
    command: npm run start
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    restart: always
    depends_on:
      - backend

  # Express API Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-backend
    command: npx tsx src/api/server.ts
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    restart: always
    depends_on:
      - redis
      - postgres

  # Background Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rison-worker
    command: npx tsx src/worker/resumeWorker.ts
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
    restart: always
    depends_on:
      - redis

  # Local DB for Dev
  postgres:
    image: postgres:15-alpine
    container_name: rison-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rison_db}
      - POSTGRES_USER=${POSTGRES_USER:-rison_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rison_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Local Redis for Dev
  redis:
    image: redis:7-alpine
    container_name: rison-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-super-secure-vps-redis-pass-12345}
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
