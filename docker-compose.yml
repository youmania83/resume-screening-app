version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      target: frontend
    container_name: rison-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    restart: always
    depends_on:
      - backend

  # Express API Backend
  backend:
    build:
      context: .
      target: backend
    container_name: rison-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    restart: always

  # Background Queue Worker
  worker:
    build:
      context: .
      target: worker
    container_name: rison-worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    restart: always

